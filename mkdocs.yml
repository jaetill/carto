site_name: carto
site_url: https://jaetill.github.io/carto/
repo_url: https://github.com/jaetill/carto
edit_uri: edit/master/docs/

theme:
  name: material
  features: [content.code.copy, navigation.tabs, navigation.sections, search.highlight]
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
  - ADRs:
    - Index: adr/index.md
    - "ADR-0001 Platform adoption": adr/0001-platform-adoption.md
  - Runbooks:
    - Index: runbooks/index.md
    - Deploy: runbooks/deploy.md