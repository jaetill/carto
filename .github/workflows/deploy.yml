name: Deploy to S3 + CloudFront + Lambda

on:
  push:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Frontend build ──────────────────────────────────
      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Sync HTML to S3 (no-cache)
        run: |
          aws s3 sync dist/ s3://jaetill-carto/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache" \
            --delete

      - name: Sync assets to S3 (immutable)
        run: |
          aws s3 sync dist/ s3://jaetill-carto/ \
            --exclude "*.html" \
            --exclude "engagements.json" \
            --exclude "engagements/*" \
            --cache-control "max-age=31536000, immutable"

      - name: Invalidate CloudFront HTML
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E36OPEPVLCLUYJ \
            --paths "/index.html" "/callback.html"

      # ── Lambda deploy ───────────────────────────────────
      - name: Ensure Lambda runtime is nodejs22.x
        run: |
          current=$(aws lambda get-function-configuration --function-name cartoApi --region us-east-2 --query 'Runtime' --output text)
          if [ "$current" != "nodejs22.x" ]; then
            echo "Updating cartoApi from $current to nodejs22.x"
            aws lambda update-function-configuration \
              --function-name cartoApi \
 